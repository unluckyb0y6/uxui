<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>4th</title>
    <style>
        .nav {
            list-style: none;
            padding: 0;
            text-align: center;
            border-top: 2px solid red;
            border-bottom: 2px solid red;
        }

        .nav li {
            display: inline-block;
            margin: 0 20px;
        }

        .nav a {
            text-decoration: none;
            letter-spacing: 8px;
            color: black;
        }

        table {
            border-collapse: collapse;
            margin: 0 auto;
            width: 500px;
        }

        th {
            background-color: green;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tbody tr {
            border-bottom: 2px solid green;
        }

        tbody tr:nth-child(odd) {
            background-color: #f9f9f9;
        }

        tbody tr:nth-child(even) {
            background-color: orange;
        }

        tbody tr:hover {
            background-color: orangered;
            color: white;
        }

        /* 🔹 이름/이메일 입력칸 테두리 항상 파란색 */
        input[type="text"] {
            border: 2px solid blue;
            padding: 5px;
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:hover {
            background-color: yellow;
        }

        input[type="text"]:focus {
            border: 2px solid lightblue;
            box-shadow: 0 0 5px lightblue;
        }

        input[type="submit"] {
            background-color: green;
            border: 2px solid black;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <ul class="nav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <table>
        <thead>
            <tr><th>학번</th> <th>이름</th> <th>성적</th> <th>학점</th></tr>
        </thead>
        <tbody>
            <tr><td>1</td> <td>Bill</td> <td>98</td> <td>A+</td></tr>
            <tr><td>2</td> <td>Steve</td> <td>89</td> <td>B+</td></tr>
            <tr><td>3</td> <td>Larry</td> <td>93</td> <td>A</td></tr>
        </tbody>
    </table>

    <h2>상품 평</h2>
    <p>받으신 상품을 평가해주세요.</p>
    <div>
        <form action="process.jsp">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="이름"><br>
            <label for="email">이메일</label>
            <input type="text" id="email" name="email" placeholder="이메일"><br>
            <label for="subject" name="subject" placeholder="상품을 평가해주세요."
            style="height: 100px"></label>
            <br>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
